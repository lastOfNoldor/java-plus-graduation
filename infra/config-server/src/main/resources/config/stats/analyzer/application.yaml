spring:
  main:
    banner-mode: off
    log-startup-info: false
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5432/ewm_analyzer
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
        format_sql: true
logging:
  level:
    ru.practicum: TRACE
    org.springframework.web: ERROR
    org.hibernate: INFO
grpc:
  server:
    port: 0

analyzer:
  kafka:
    common-properties:
      bootstrap.servers: localhost:9092
      enable.auto.commit: false
    consumers:
      - type: EventSimilarityProcessor
        properties:
          "key.deserializer": "org.apache.kafka.common.serialization.StringDeserializer"
          "value.deserializer": "ru.practicum.kafka.deserializer.EventSimilarityDeserializer"
          "group.id": "stats.analyzer.similarities"
        topics:
          - "stats.events-similarity.v1"
        poll-timeout: 500ms

      - type: UserActionsProcessor
        properties:
          "key.deserializer": "org.apache.kafka.common.serialization.LongDeserializer"
          "value.deserializer": "ru.practicum.kafka.deserializer.UserActionDeserializer"
          "group.id": "stats.analyzer.user-actions"
        topics:
          - "stats.user-actions.v1"
        poll-timeout: 500ms

    action-weight:
      view: 0.4
      registered: 0.8
      like: 1.0



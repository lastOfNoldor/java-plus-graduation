/**
  у нас 3 вида рекомендаций, рекомендации для пользователя, похожие мероприятия(приходит мероприятие мы говорим найди нам похожее) и
   GetInteractionsCount - дай нам рейтинг мероприятий. То что мы раньше хранили как views в прошлой верссии приложения, теперь это будет поле double rating.
   и мы по grc вызывая данный метод(он на вход принимает список id и на выходе возращает рекомендации мероприятя и его рейтинг.
   Мы получаемые числа превращаем в хэштаблицу и заполняем нашу dto полем rating. Тоесть подключив клиент реккомендательной системы RecommendationClient
   мы сможем его вызвать уже там где формировали список мероприятий и заполнить поле рейтинг. И наконец нам останется сделать 2(или 3?) новых эндпоинта из ТЗ

   про рейтинг - для того чтобы analyzer мог всё что здесь написано это рассчитывать он хранит состояния,он хранит данные в БД,
   то что мы видели в матрицах, это хранится в схеме. 1ая схема - это взаимодействия(пользователь мероприятие и его рейтинг(04.08.1 уменьшатся или подняться выше единицы он  не может!)
   эти данные аналайзер получает от коллектора как и аггрегатор,но он их хранит in-memory,а analyzer в БД,данные они читают паралельно из одной очереди.
   analyzer читает и заполняет табличку. Еще раз, рейтинг может увеличивается только до единицы и не может уменьшаться,то есть либо будет insert либо update поля rating.
   а 2ая табличка - коэффицент  похожести.к нем относятся методы GetRecommendationsForUser и GetSimilarEvents.
    по GetSimilarEvents - У нас есть мероприятия мы в табличку похожести заполняем теми данные которые нам даёт аггрегатор.
    в алгоритме мы говорим что идентификатор первого мероприятия, будет меньше чем идентификатор второй потому что если
    мы поменяем местами то это будет одно и тоже соответственно мы всегда их упорядоченно храним и используем.
    И у нас есть какое то мероприятие, надо найти к нему похожее.( в SimilarEventsRequestProto у нас приходит
    идентификатор мероприятия и сколько похожих нужно найти, поэтому мы идем в наше табличку similarities находим
    для этого мероприятия наиболее похожие мероприятия.
    GetRecommendationsForUser - у нас пользователь уже взаимодействовал с какимито мероприятиями,соответсвенно мы делаем выборку таких мероприятий,
    у нас должна быть константа сколько таких мероприятий мы берем,соответсвенно мы берем мероприятия смаксималньым рейтингом.
    Для каждого такого мероприятия мы можем найти походие и дальше всё это нужно объединить и отсортировать.
    Тоесть если здесь важно написать правильно селекты, то весь алгоритм находится в аггрегаторе
    Обрати внимание что UserReccomendationsRequestProto еще не написан.


 */

syntax = "proto3";

package stats.service.dashboard;

import "stats/messages/user_recommendations_request.proto";
import "stats/messages/similar_events_request.proto";
import "stats/messages/interactions_count_request.proto";
import "stats/messages/recommended_event.proto";

option java_package = "ru.practicum.ewm.stats.proto";

service RecommendationsController {

  // я так понимаю для нового эндпоинта в модуле event-service котоырй тоже нужно реализовать в тз это GEt events/recommendations
  rpc GetRecommendationsForUser (stats.message.UserRecommendationsRequestProto)
      returns (stream stats.message.RecommendedEventProto);
  // нахождение похожих мероприятий возможно эндпоинт не описан в тз
  rpc GetSimilarEvents (stats.message.SimilarEventsRequestProto)
      returns (stream stats.message.RecommendedEventProto);

  // для того чтобы analyzer мог всё это рассчитывать что написнао в этмо классе он хронит состояние в БД
  rpc GetInteractionsCount (stats.message.InteractionsCountRequestProto)
      returns (stream stats.message.RecommendedEventProto);
  // мы получаемые числы помещаем в хэш-таблицу и заполняем нашу дтошку значением поля "rating"
}
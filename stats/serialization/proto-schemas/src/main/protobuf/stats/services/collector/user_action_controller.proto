/**
 это интерфейсы по взаимодействию collector и analyzer. collector будет принимать все данные поэтому в него приходит объект с действием пользователя.
  Соответсвенно могут быть 3 типа взаимодействия. у коллектора логика простая сохранить этот объект только уже в авро формате в кафку.
  По этмоу интерфайсу мы создаем сервис и клиента(?) которого мы помещаем в библиотечку stats_client. И после этого поместить в нужные места(видимо в eventservice, пока непонятно)
  Тоесть мы вызываем этот метод и сохраняем там где раньше была обычная статистика. Там где у нас регистрация на мероприятие, вызываем тоже. В ТЗ есть api куда нужно добавить
  (PUT /events/{eventId}/like . Заголовока X-EWM-USER-ID тоже раньше у нас не было его нужно кудато добавить. модуль Collector еще не написан,написаны только классы которые я скинул не считая core модулей(модули event,user,request,category)

  aggregator прочитает те данные которые сохранил у нас collector и их будет аггрегировать в плане того что приходит новое взаимодейтвие, аггрегатор смотрит изменился ли у нас коэффицент,
  где то если изменился то пересчитывает коэффицент похожести,если они в итоге изменились то сообщение нужно отправить в формате EventsSimilarity, а если не поменялся то мы пишем в логах
   почему не поменялось и не отправляем это сообьщение. Подход к алгоритму в том что данные хранятся im-memory без восстановление состояния тоесть в хеш таблицах где ключами являются
   мероприятия вы храните их коэффицент похожести и рассчитываете. При это кроме рассчета похожести нам нужно матрицу тоже хранить чтобы рассчитывать коэффицент похожести.
   Итого в аггрегаторе будет несколько хэш таблиц с помощью которых и где  мы рассчитываем похожести и отправлять. Всё это делается по алгоритму.
   что при этом делается в analyzer мне не очень понятно.
 */

syntax = "proto3";

package  stats.service.collector;

import "google/protobuf/empty.proto";
import "stats/messages/user_action.proto";

option  java_package = "ru.practicum.ewm.stats.proto";

service UserActionController {
  rpc CollectUserAction (stats.message.UserActionProto)
    returns (google.protobuf.Empty);
}